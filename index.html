<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BANDMAP</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--y:#FFD600;--bg:#0A0A0A;--card:#141414;--border:#222;--red:#FF1744;--font:'IBM Plex Mono','SF Mono','Fira Code',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--bg);color:var(--y);font-family:var(--font)}
body{height:100%;overflow:hidden}
input,button,select{font-family:var(--font)}
button{cursor:pointer;border:none;background:none;color:var(--y)}
input[type=range]{width:100%;accent-color:var(--y);height:20px}

#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative}

.hdr{padding:12px 16px 8px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700;letter-spacing:3px}
.icon-btn{border:1px solid var(--y);border-radius:6px;padding:6px 8px;transition:all .15s}
.icon-btn.on{background:var(--y)}
.icon-btn.on svg{stroke:var(--bg)}
.row{display:flex;gap:8px}
.box{background:var(--card);border-radius:8px;padding:7px 10px;border:1px solid var(--border);display:flex;align-items:center;gap:6px}
.lbl{font-size:9px;opacity:.5;letter-spacing:1px}
.bpm-in{background:0;border:0;color:var(--y);font-size:20px;font-weight:700;width:48px;text-align:center;outline:0}
.bpm-ar{display:flex;flex-direction:column;gap:0}
.bpm-ar button{padding:0;line-height:1;opacity:.6;font-size:11px}
.ts-btn{border:1px solid var(--y);border-radius:4px;padding:2px 7px;font-size:12px;font-weight:700;transition:all .1s}
.ts-btn.on{background:var(--y);color:var(--bg)}
.dur{margin-top:5px;display:flex;justify-content:space-between;font-size:9px;opacity:.35;letter-spacing:1px}

.sett{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:none;flex-shrink:0}
.sett.open{display:block}
.s-row{margin-bottom:10px}
.s-hdr{display:flex;justify-content:space-between;margin-bottom:3px}
.s-hdr span:first-child{font-size:10px;opacity:.5;letter-spacing:1px}
.s-hdr span:last-child{font-size:10px;font-weight:700}
.s-labels{display:flex;justify-content:space-between;font-size:8px;opacity:.3;margin-top:1px}

.blk-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 16px;padding-bottom:90px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch}
.empty{text-align:center;padding:36px 20px;opacity:.2;font-size:12px}

.blk{background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden;position:relative;transition:all .15s}
.blk.act{border-width:2px;transform:scale(1.01)}
.blk.dragover{border:2px dashed var(--y)}
.blk.dragging{opacity:.3}
.blk-prog{position:absolute;top:0;left:0;height:100%;border-radius:10px;transition:width .1s linear;pointer-events:none}
.blk-main{display:flex;align-items:center;padding:10px 12px;gap:8px;position:relative;z-index:1}
.blk-bar{width:4px;height:34px;border-radius:2px;flex-shrink:0}
.blk-grip{opacity:.2;flex-shrink:0}
.blk-info{flex:1;min-width:0}
.blk-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.blk-meta{font-size:9px;opacity:.4;display:flex;gap:7px;margin-top:1px}
.blk-beat{text-align:center;flex-shrink:0;display:none}
.blk-beat-n{font-size:22px;font-weight:700;line-height:1}
.blk-beat-b{font-size:8px;opacity:.4}
.blk-chev{flex-shrink:0;opacity:.3}

.blk-edit{padding:0 12px 12px;display:none;flex-direction:column;gap:9px;border-top:1px solid var(--border);padding-top:9px}
.blk-edit.open{display:flex}
.e-lbl{font-size:9px;opacity:.4;letter-spacing:1px;margin-bottom:3px;display:block}
.e-in{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--y);padding:7px 9px;font-size:12px;outline:0}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tag{border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:9px;transition:all .1s}
.tag.on{background:var(--y);color:var(--bg);border-color:var(--y)}
.bars-r{display:flex;gap:5px}
.bars-b{flex:1;border:1px solid var(--y);border-radius:6px;padding:7px 0;font-size:14px;font-weight:700;transition:all .1s}
.bars-b.on{background:var(--y);color:var(--bg)}
.colors{display:flex;flex-wrap:wrap;gap:5px}
.csw{width:26px;height:26px;border-radius:6px;border:2px solid transparent}
.csw.on{border:3px solid #fff}
.tgl-r{display:flex;gap:7px}
.tgl{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border:1px solid var(--border);border-radius:6px;padding:7px;font-size:10px;transition:all .1s}
.tgl.on{background:rgba(255,214,0,.12);border-color:var(--y)}
.act-r{display:flex;gap:7px}
.act-b{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border:1px solid var(--border);border-radius:6px;padding:7px;font-size:10px}
.act-b.del{background:rgba(255,23,68,.1);border-color:var(--red);color:var(--red)}

.add-btn{width:100%;border:2px dashed var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:12px;opacity:.4;margin-top:4px}
.add-p{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px;margin-top:4px;display:none}
.add-p.open{display:block}
.add-t{font-size:10px;opacity:.4;letter-spacing:1px;text-align:center;margin-bottom:8px}
.add-s{display:flex;gap:7px}
.add-sb{flex:1;background:var(--y);color:var(--bg);border-radius:8px;padding:12px 0;font-size:17px;font-weight:700}
.add-c{width:100%;margin-top:7px;border:1px solid var(--border);border-radius:8px;padding:7px;font-size:10px;opacity:.35}

.bot{position:sticky;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:10px;align-items:center;z-index:200;flex-shrink:0}
.play{width:50px;height:50px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.play.go{background:var(--y)}
.play.stop{background:var(--red)}
.play.off{opacity:.2;pointer-events:none}
.bot-info{flex:1}
.bot-m{font-size:12px;font-weight:700}
.bot-s{font-size:9px;opacity:.4}
.exp{height:50px;border-radius:12px;flex-shrink:0;border:1px solid var(--y);display:flex;align-items:center;justify-content:center;gap:5px;padding:0 12px;font-size:10px;font-weight:700;letter-spacing:1px;position:relative;overflow:hidden;transition:opacity .15s}
.exp.off{opacity:.2;pointer-events:none}
.exp-bar{position:absolute;left:0;bottom:0;height:3px;background:var(--y);transition:width .3s;width:0}

.voice{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15px;font-weight:700;color:var(--y);opacity:0;pointer-events:none;z-index:500;text-align:center;text-shadow:0 0 20px rgba(255,214,0,.5);transition:opacity .08s}
.voice.show{opacity:1}
.glow{position:fixed;top:0;left:0;right:0;max-width:480px;margin:0 auto;height:2px;z-index:300;display:none}
.glow.show{display:block}

.blk-list::-webkit-scrollbar{width:3px}
.blk-list::-webkit-scrollbar-track{background:0}
.blk-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="app">
<div class="glow" id="glow"></div>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFD600" stroke-width="2"><path d="M9,18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      BANDMAP
    </div>
    <button class="icon-btn" id="settBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FFD600" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4,15a1.65,1.65 0 0,0,.33,1.82l.06.06a2,2 0 0,1-2.83,2.83l-.06-.06a1.65,1.65 0 0,0-1.82-.33 1.65,1.65 0 0,0-1,1.51V21a2,2 0 0,1-4,0v-.09A1.65,1.65 0 0,0,9,19.4a1.65,1.65 0 0,0-1.82.33l-.06.06a2,2 0 0,1-2.83-2.83l.06-.06A1.65,1.65 0 0,0,4.68,15a1.65,1.65 0 0,0-1.51-1H3a2,2 0 0,1,0-4h.09A1.65,1.65 0 0,0,4.6,9a1.65,1.65 0 0,0-.33-1.82l-.06-.06a2,2 0 0,1,2.83-2.83l.06.06A1.65,1.65 0 0,0,9,4.68a1.65,1.65 0 0,0,1-1.51V3a2,2 0 0,1,4,0v.09a1.65,1.65 0 0,0,1,1.51 1.65,1.65 0 0,0,1.82-.33l.06-.06a2,2 0 0,1,2.83,2.83l-.06.06A1.65,1.65 0 0,0,19.4,9a1.65,1.65 0 0,0,1.51,1H21a2,2 0 0,1,0,4h-.09a1.65,1.65 0 0,0-1.51,1Z"/></svg>
    </button>
  </div>
  <div class="row">
    <div class="box" style="flex:1">
      <span class="lbl">BPM</span>
      <input type="number" id="bpmIn" class="bpm-in" value="120" min="30" max="300">
      <div class="bpm-ar"><button id="bU">▲</button><button id="bD">▼</button></div>
    </div>
    <div class="box" id="tsBox"><span class="lbl">COMP</span></div>
  </div>
  <div class="dur"><span id="dBars">0 compases</span><span id="dTime">0:00</span></div>
</div>
<div class="sett" id="sett">
  <div class="s-row"><div class="s-hdr"><span>REVERB BASE</span><span id="rvV">15%</span></div><input type="range" id="rvS" min="0" max="80" value="15"></div>
  <div class="s-row"><div class="s-hdr"><span>INTENSIDAD TRANSICIÓN</span><span id="riV">50%</span></div><input type="range" id="riS" min="0" max="100" value="50"><div class="s-labels"><span>SMOOTH</span><span>DRÁSTICO</span></div></div>
  <div class="s-row" style="margin:0"><div style="display:flex;align-items:center;gap:7px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FFD600" stroke-width="2"><path d="M12,1a3,3 0 0,0-3,3v8a3,3 0 0,0,6,0V4A3,3 0 0,0,12,1Z"/><path d="M19,10v2a7,7 0 0,1-14,0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg><span style="font-size:9px;opacity:.4">Preview: voz real (Speech API). WAV: voz sintética por formantes.</span></div></div>
</div>
<div class="blk-list" id="list"></div>
<div class="voice" id="voice"></div>
<div class="bot">
  <button class="play go off" id="playBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="#0A0A0A"><polygon points="6,3 20,12 6,21"/></svg></button>
  <div class="bot-info"><div class="bot-m" id="bM">120 BPM · 4/4</div><div class="bot-s" id="bS">0 bloques · 0:00</div></div>
  <button class="exp off" id="expBtn"><div class="exp-bar" id="expBar"></div><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FFD600" stroke-width="2" stroke-linecap="round"><path d="M21,15v4a2,2 0 0,1-2,2H5a2,2 0 0,1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span id="expL">WAV</span></button>
</div>
</div>
<script>
const SIZES=[4,8,16,32];
const COLORS=["#FFD600","#FF6D00","#00E676","#00B0FF","#E040FB","#FF1744","#76FF03","#F50057","#18FFFF","#FFAB00","#7C4DFF","#64FFDA"];
const NAMES=["Intro","Verso","Pre-Estribillo","Estribillo","Puente","Solo","Breakdown","Outro","Build-Up","Drop","Interludio","Coda"];

let S={bpm:120,ts:4,rvB:0.15,rvI:0.5,blocks:[
  {id:1,name:"Intro",bars:8,color:"#00E676",claq:true,voice:true},
  {id:2,name:"Verso 1",bars:16,color:"#FFD600",claq:true,voice:true},
  {id:3,name:"Estribillo",bars:8,color:"#E040FB",claq:true,voice:true},
],nid:4,playing:false,editing:null,showSett:false,showAdd:false};

// ═══════ AUDIO ENGINE (iOS-safe) ═══════
const A={
  ctx:null,master:null,rvG:null,dryG:null,playing:false,tmr:null,bi:0,

  ensure(){
    if(!this.ctx){
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      this.master=this.ctx.createGain();this.master.gain.value=0.5;
      const sr=this.ctx.sampleRate,len=sr*2,imp=this.ctx.createBuffer(2,len,sr);
      for(let c=0;c<2;c++){const d=imp.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5)}
      const conv=this.ctx.createConvolver();conv.buffer=imp;
      this.rvG=this.ctx.createGain();this.rvG.gain.value=0.15;
      this.dryG=this.ctx.createGain();this.dryG.gain.value=0.85;
      this.master.connect(this.dryG);this.dryG.connect(this.ctx.destination);
      this.master.connect(conv);conv.connect(this.rvG);this.rvG.connect(this.ctx.destination);
    }
    if(this.ctx.state==='suspended')this.ctx.resume();
  },

  setRv(w){if(!this.rvG)return;this.rvG.gain.value=Math.min(1,w);this.dryG.gain.value=Math.max(0,1-w)},

  clk(f,v,d=.04){
    if(!this.ctx)return;const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+d);
  },

  cnt(i){
    const F=[1600,1800,2000,2400],V=[.3,.3,.35,.5],D=[.06,.06,.06,.09];
    if(!this.ctx)return;const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.frequency.value=F[i]||2400;o.type="triangle";g.gain.setValueAtTime(V[i]||.4,t);
    g.gain.exponentialRampToValueAtTime(.001,t+(D[i]||.07));
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+(D[i]||.07));
  },

  say(t,r=1.8){
    if(!('speechSynthesis'in window))return;speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);u.lang='es-ES';u.rate=r;u.pitch=.9;u.volume=1;speechSynthesis.speak(u);
  },

  start(blocks,bpm,ts,rvB,rvI,onTick,onDone){
    this.ensure();this.playing=true;this.bi=0;
    const iv=60000/bpm;let gB=0,biB=0;
    const totB=blocks.reduce((s,b)=>s+b.bars*ts,0);
    const tick=()=>{
      if(!this.playing||this.bi>=blocks.length){this.playing=false;onDone();return}
      const bl=blocks[this.bi],tBB=bl.bars*ts,bIBar=biB%ts,barIB=Math.floor(biB/ts);
      const pr=biB/tBB;let rv=rvB;
      if(pr>.7){const rp=(pr-.7)/.3;rv=rvB+(.9-rvB)*Math.pow(rp,2-rvI*1.5)}
      this.setRv(rv);
      const dB=bIBar===0,lB=barIB===bl.bars-1,hN=this.bi<blocks.length-1,claq=bl.claq&&lB&&hN,ent=biB===0;
      if(ent){this.clk(1400,.85,.08);this.clk(700,.35,.06)}
      else if(claq){this.clk(dB?1400:1000,dB?.7:.5,dB?.06:.04);this.clk(2200,.25,.015)}
      else if(dB){this.clk(1200,.5,.05)}
      else{this.clk(800,.25,.03)}
      // Voice on last bar: "Y [nombre] · en · dos · tres y"
      if(hN&&bl.voice&&lB){
        const nn=blocks[this.bi+1].name;
        if(ts>=4){const cs=ts-4,ci=bIBar-cs;
          if(ci===0){this.cnt(0);this.say("Y "+nn,1.8);showV("Y "+nn)}
          else if(ci===1){this.cnt(1);showV("en")}
          else if(ci===2){this.cnt(2);showV("dos")}
          else if(ci===3){this.cnt(3);showV("tres y")}
        }else if(ts===3){
          if(bIBar===0){this.cnt(0);this.say("Y "+nn,1.8);showV("Y "+nn)}
          else if(bIBar===1){this.cnt(2);showV("dos")}
          else if(bIBar===2){this.cnt(3);showV("tres y")}
        }
      }
      onTick({gB,biB,bIBar,barIB,bIdx:this.bi,totB,rv,tBB});
      biB++;gB++;
      if(biB>=tBB){biB=0;this.bi++;this.setRv(rvB)}
      if(this.playing)this.tmr=setTimeout(tick,iv);
    };
    tick();
  },
  stop(){this.playing=false;if(this.tmr)clearTimeout(this.tmr);if('speechSynthesis'in window)speechSynthesis.cancel()}
};

let vT;function showV(t){const e=$('voice');e.textContent=t;e.classList.add('show');clearTimeout(vT);vT=setTimeout(()=>e.classList.remove('show'),350)}

// ═══════ FORMANT VOICE for WAV ═══════
function schedFormant(ctx,dest,time,vowel,dur,vol){
  const FM={a:[800,1200,2500],e:[400,2200,2800],o:[500,900,2500],i:[300,2300,3000],u:[350,700,2500]};
  const F=FM[vowel]||FM.a;
  const src=ctx.createOscillator();src.type='sawtooth';src.frequency.value=150;
  const sG=ctx.createGain();sG.gain.setValueAtTime(vol,time);sG.gain.setValueAtTime(vol,time+dur*.7);sG.gain.exponentialRampToValueAtTime(.001,time+dur);
  src.connect(sG);
  F.forEach((f,i)=>{
    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=f;bp.Q.value=i===0?5:8;
    const fg=ctx.createGain();fg.gain.value=i===0?1:(i===1?.7:.3);
    sG.connect(bp);bp.connect(fg);fg.connect(dest);
  });
  src.start(time);src.stop(time+dur);
}
function schedWord(ctx,dest,time,word,beatDur,vol){
  const W={y:[{v:'i',t:0,d:.6}],en:[{v:'e',t:0,d:.5}],dos:[{v:'o',t:0,d:.5}],tres:[{v:'e',t:0,d:.5}]};
  const seq=W[word]||[{v:'a',t:0,d:.5}];
  const sc=Math.min(beatDur*.8,.3);
  seq.forEach(s=>schedFormant(ctx,dest,time+s.t*sc,s.v,s.d*sc,vol));
}

// ═══════ WAV EXPORT ═══════
async function exportWav(blocks,bpm,ts,rvB,rvI){
  const sr=44100,iv=60/bpm,totB=blocks.reduce((s,b)=>s+b.bars*ts,0),dur=totB*iv+3;
  const ctx=new OfflineAudioContext(2,Math.ceil(dur*sr),sr);
  const impLen=sr*2,imp=ctx.createBuffer(2,impLen,sr);
  for(let c=0;c<2;c++){const d=imp.getChannelData(c);for(let i=0;i<impLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/impLen,2.5)}
  const conv=ctx.createConvolver();conv.buffer=imp;
  const wet=ctx.createGain(),dry=ctx.createGain(),master=ctx.createGain();master.gain.value=.5;
  master.connect(dry);dry.connect(ctx.destination);master.connect(conv);conv.connect(wet);wet.connect(ctx.destination);

  function sch(t,f,v,d,tp='sine'){
    const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;o.type=tp;
    g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
    o.connect(g);g.connect(master);o.start(t);o.stop(t+d);
  }

  let gB=0;
  for(let bi=0;bi<blocks.length;bi++){
    const bl=blocks[bi],tBB=bl.bars*ts;
    for(let bib=0;bib<tBB;bib++){
      const time=gB*iv,bIBar=bib%ts,barIB=Math.floor(bib/ts);
      const dB=bIBar===0,lB=barIB===bl.bars-1,hN=bi<blocks.length-1,claq=bl.claq&&lB&&hN,ent=bib===0;
      const pr=bib/tBB;let rv=rvB;
      if(pr>.7){const rp=(pr-.7)/.3;rv=rvB+(.9-rvB)*Math.pow(rp,2-rvI*1.5)}
      wet.gain.setValueAtTime(rv,time);dry.gain.setValueAtTime(1-rv,time);

      if(ent){sch(time,1400,.85,.08);sch(time,700,.35,.06)}
      else if(claq){sch(time,dB?1400:1000,dB?.7:.5,dB?.06:.04);sch(time,2200,.25,.015)}
      else if(dB){sch(time,1200,.5,.05)}
      else{sch(time,800,.25,.03)}

      // Count tones + formant voice
      if(hN&&bl.voice&&lB){
        const CF=[1600,1800,2000,2400],CV=[.3,.3,.35,.5],CD=[.06,.06,.06,.09];
        if(ts>=4){const cs=ts-4,ci=bIBar-cs;
          if(ci>=0&&ci<4){
            sch(time,CF[ci],CV[ci],CD[ci],'triangle');
            if(ci===0)schedWord(ctx,master,time,'y',iv,.4);
            else if(ci===1)schedWord(ctx,master,time,'en',iv,.35);
            else if(ci===2)schedWord(ctx,master,time,'dos',iv,.35);
            else if(ci===3)schedWord(ctx,master,time,'tres',iv,.4);
          }
        }else if(ts===3&&bIBar<3){
          sch(time,CF[bIBar],CV[bIBar],CD[bIBar],'triangle');
          if(bIBar===0)schedWord(ctx,master,time,'y',iv,.4);
          else if(bIBar===1)schedWord(ctx,master,time,'dos',iv,.35);
          else if(bIBar===2)schedWord(ctx,master,time,'tres',iv,.4);
        }
      }
      gB++;
    }
  }
  const rendered=await ctx.startRendering();
  // WAV encoding
  const nc=rendered.numberOfChannels,sRate=rendered.sampleRate,len=rendered.length*nc*2+44;
  const ab=new ArrayBuffer(len),v=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};
  ws(0,'RIFF');v.setUint32(4,len-8,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,nc,true);v.setUint32(24,sRate,true);v.setUint32(28,sRate*nc*2,true);v.setUint16(32,nc*2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,rendered.length*nc*2,true);
  let off=44;const chs=[];for(let c=0;c<nc;c++)chs.push(rendered.getChannelData(c));
  for(let i=0;i<rendered.length;i++){for(let c=0;c<nc;c++){const s=Math.max(-1,Math.min(1,chs[c][i]));v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2}}
  return new Blob([ab],{type:'audio/wav'});
}

// ═══════ UI ═══════
const $=id=>document.getElementById(id);
function render(){renderBlocks();updDur();updBot();updPlay()}
function updDur(){const tb=S.blocks.reduce((s,b)=>s+b.bars,0),secs=tb*S.ts*(60/S.bpm),m=Math.floor(secs/60),s=Math.floor(secs%60);$('dBars').textContent=tb+' compases';$('dTime').textContent=m+':'+String(s).padStart(2,'0')}
function updBot(ps){
  if(S.playing&&ps){const b=S.blocks[ps.bIdx];if(b){$('bM').textContent=b.name;$('bM').style.color=b.color;$('bS').textContent=`Compás ${ps.barIB+1}/${b.bars} · Bloque ${ps.bIdx+1}/${S.blocks.length}`}}
  else{$('bM').style.color='#FFD600';$('bM').textContent=S.bpm+' BPM · '+S.ts+'/4';const tb=S.blocks.reduce((s,b)=>s+b.bars,0),secs=tb*S.ts*(60/S.bpm),m=Math.floor(secs/60),s=Math.floor(secs%60);$('bS').textContent=S.blocks.length+' bloques · '+m+':'+String(s).padStart(2,'0')}
}
function updPlay(){
  const btn=$('playBtn'),exp=$('expBtn'),empty=!S.blocks.length;
  if(S.playing){btn.className='play stop';btn.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="#0A0A0A"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>';exp.classList.add('off')}
  else{btn.className='play go'+(empty?' off':'');btn.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="#0A0A0A"><polygon points="6,3 20,12 6,21"/></svg>';exp.classList.toggle('off',empty)}
}
function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function renderBlocks(){
  const list=$('list');list.innerHTML='';
  if(!S.blocks.length)list.innerHTML='<div class="empty">Añade bloques para construir la estructura</div>';
  S.blocks.forEach((b,i)=>{
    const c=document.createElement('div');c.className='blk';c.dataset.idx=i;c.id='b'+b.id;if(!S.playing)c.draggable=true;
    c.innerHTML=`<div class="blk-prog" id="bp${b.id}" style="background:${b.color}15;width:0"></div>
    <div class="blk-main" data-click="${b.id}">
      <div class="blk-bar" style="background:${b.color}"></div>
      ${!S.playing?'<div class="blk-grip"><svg width="14" height="14" viewBox="0 0 24 24" fill="#FFD600"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg></div>':''}
      <div class="blk-info"><div class="blk-name" style="color:${b.color}">${esc(b.name)}</div><div class="blk-meta"><span>${b.bars} comp.</span>${b.claq?'<span>🔔claq</span>':''}${b.voice?'<span>🎙voz</span>':''}</div></div>
      <div class="blk-beat" id="bd${b.id}"><div class="blk-beat-n" style="color:${b.color}">-</div><div class="blk-beat-b">-</div></div>
      ${!S.playing?`<div class="blk-chev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FFD600" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="${S.editing===b.id?'18,15 12,9 6,15':'6,9 12,15 18,9'}"/></svg></div>`:''}
    </div>${!S.playing?buildEdit(b):''}`;
    if(!S.playing){
      c.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',i);c.classList.add('dragging')});
      c.addEventListener('dragend',()=>c.classList.remove('dragging'));
      c.addEventListener('dragover',e=>{e.preventDefault();c.classList.add('dragover')});
      c.addEventListener('dragleave',()=>c.classList.remove('dragover'));
      c.addEventListener('drop',e=>{e.preventDefault();c.classList.remove('dragover');const fi=+e.dataTransfer.getData('text/plain');if(fi!==i){const[m]=S.blocks.splice(fi,1);S.blocks.splice(i,0,m);render()}});
    }
    list.appendChild(c);
  });
  if(!S.playing){
    const d=document.createElement('div');
    if(!S.showAdd){d.innerHTML='<button class="add-btn" id="addB"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFD600" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Añadir bloque</button>';d.querySelector('#addB').onclick=()=>{S.showAdd=true;render()}}
    else{d.innerHTML=`<div class="add-p open"><div class="add-t">COMPASES DEL BLOQUE</div><div class="add-s">${SIZES.map(s=>`<button class="add-sb" data-sz="${s}">${s}</button>`).join('')}</div><button class="add-c" id="addC">Cancelar</button></div>`;d.querySelectorAll('[data-sz]').forEach(b=>b.onclick=()=>addBlk(+b.dataset.sz));d.querySelector('#addC').onclick=()=>{S.showAdd=false;render()}}
    list.appendChild(d);
  }
}
function buildEdit(b){
  const open=S.editing===b.id;
  return `<div class="blk-edit${open?' open':''}">
    <div><span class="e-lbl">NOMBRE</span><input class="e-in" value="${esc(b.name)}" data-field="name" data-id="${b.id}"><div class="tags">${NAMES.map(n=>`<button class="tag${b.name===n?' on':''}" data-pre="${n}" data-id="${b.id}">${n}</button>`).join('')}</div></div>
    <div><span class="e-lbl">COMPASES</span><div class="bars-r">${SIZES.map(s=>`<button class="bars-b${b.bars===s?' on':''}" data-bar="${s}" data-id="${b.id}">${s}</button>`).join('')}</div></div>
    <div><span class="e-lbl">COLOR</span><div class="colors">${COLORS.map(c=>`<button class="csw${b.color===c?' on':''}" data-col="${c}" data-id="${b.id}" style="background:${c}"></button>`).join('')}</div></div>
    <div class="tgl-r"><button class="tgl${b.claq?' on':''}" data-tgl="claq" data-id="${b.id}">🔔 Claqueta</button><button class="tgl${b.voice?' on':''}" data-tgl="voice" data-id="${b.id}">🎙 Voz</button></div>
    <div class="act-r"><button class="act-b" data-act="dup" data-id="${b.id}">📋 Duplicar</button><button class="act-b del" data-act="del" data-id="${b.id}">🗑 Eliminar</button></div></div>`;
}

// Delegation
$('list').addEventListener('click',e=>{
  const mc=e.target.closest('[data-click]');if(mc&&!S.playing){S.editing=S.editing===+mc.dataset.click?null:+mc.dataset.click;render();return}
  const pr=e.target.closest('[data-pre]');if(pr){const b=S.blocks.find(x=>x.id===+pr.dataset.id);if(b){b.name=pr.dataset.pre;render()}return}
  const br=e.target.closest('[data-bar]');if(br){const b=S.blocks.find(x=>x.id===+br.dataset.id);if(b){b.bars=+br.dataset.bar;render()}return}
  const cl=e.target.closest('[data-col]');if(cl){const b=S.blocks.find(x=>x.id===+cl.dataset.id);if(b){b.color=cl.dataset.col;render()}return}
  const tg=e.target.closest('[data-tgl]');if(tg){const b=S.blocks.find(x=>x.id===+tg.dataset.id);if(b){b[tg.dataset.tgl]=!b[tg.dataset.tgl];render()}return}
  const ac=e.target.closest('[data-act]');if(ac){const id=+ac.dataset.id;if(ac.dataset.act==='del'){S.blocks=S.blocks.filter(x=>x.id!==id);if(S.editing===id)S.editing=null;render()}else if(ac.dataset.act==='dup'){const i=S.blocks.findIndex(x=>x.id===id);if(i>-1){S.blocks.splice(i+1,0,{...S.blocks[i],id:S.nid++,name:S.blocks[i].name+' (copia)'});render()}}}
});
$('list').addEventListener('input',e=>{if(e.target.dataset.field==='name'){const b=S.blocks.find(x=>x.id===+e.target.dataset.id);if(b)b.name=e.target.value;updDur()}});

// Header
$('bpmIn').addEventListener('change',e=>{S.bpm=Math.max(30,Math.min(300,+e.target.value||120));e.target.value=S.bpm;updDur();updBot()});
$('bU').onclick=()=>{S.bpm=Math.min(300,S.bpm+1);$('bpmIn').value=S.bpm;updDur();updBot()};
$('bD').onclick=()=>{S.bpm=Math.max(30,S.bpm-1);$('bpmIn').value=S.bpm;updDur();updBot()};
const tsB=$('tsBox');[3,4,6].forEach(t=>{const b=document.createElement('button');b.className='ts-btn'+(S.ts===t?' on':'');b.textContent=t+'/4';b.onclick=()=>{S.ts=t;tsB.querySelectorAll('.ts-btn').forEach(x=>x.classList.toggle('on',+x.textContent===t));updDur();updBot()};tsB.appendChild(b)});
$('settBtn').onclick=()=>{S.showSett=!S.showSett;$('sett').classList.toggle('open',S.showSett);$('settBtn').classList.toggle('on',S.showSett)};
$('rvS').oninput=e=>{S.rvB=+e.target.value/100;$('rvV').textContent=e.target.value+'%'};
$('riS').oninput=e=>{S.rvI=+e.target.value/100;$('riV').textContent=e.target.value+'%'};

// PLAY — iOS safe
$('playBtn').onclick=()=>{
  if(S.playing){A.stop();S.playing=false;$('glow').classList.remove('show');$('voice').classList.remove('show');render();return}
  if(!S.blocks.length)return;
  A.ensure(); // iOS: AudioContext must be created/resumed in user gesture
  S.playing=true;S.editing=null;render();$('glow').classList.add('show');
  A.start(S.blocks,S.bpm,S.ts,S.rvB,S.rvI,ps=>{
    const b=S.blocks[ps.bIdx];if(!b)return;
    const hex=Math.round(ps.rv*255).toString(16).padStart(2,'0');
    $('glow').style.background=`linear-gradient(90deg,${b.color}00,${b.color}${hex},${b.color}00)`;
    S.blocks.forEach((bl,i)=>{
      const card=$('b'+bl.id),disp=$('bd'+bl.id),prog=$('bp'+bl.id);if(!card)return;
      if(i===ps.bIdx){card.style.borderColor=bl.color;card.style.borderWidth='2px';card.style.boxShadow=`0 0 20px ${bl.color}33`;if(disp){disp.style.display='block';disp.querySelector('.blk-beat-n').textContent=ps.bIBar+1;disp.querySelector('.blk-beat-b').textContent=`c.${ps.barIB+1}/${bl.bars}`}if(prog)prog.style.width=(ps.biB/ps.tBB*100)+'%';card.scrollIntoView({behavior:'smooth',block:'center'})}
      else{card.style.borderColor='#222';card.style.borderWidth='1px';card.style.boxShadow='none';if(disp)disp.style.display='none';if(prog)prog.style.width=i<ps.bIdx?'100%':'0'}
    });updBot(ps);
  },()=>{S.playing=false;$('glow').classList.remove('show');$('voice').classList.remove('show');render()});
};

// EXPORT WAV
let exporting=false;
$('expBtn').onclick=async()=>{
  if(!S.blocks.length||S.playing||exporting)return;exporting=true;
  $('expBtn').classList.add('off');$('playBtn').classList.add('off');
  const bar=$('expBar'),lbl=$('expL');lbl.textContent='...';
  let pct=0;const pi=setInterval(()=>{pct=Math.min(pct+5,90);bar.style.width=pct+'%'},200);
  try{
    const wav=await exportWav(S.blocks,S.bpm,S.ts,S.rvB,S.rvI);
    clearInterval(pi);bar.style.width='100%';lbl.textContent='✓';
    const url=URL.createObjectURL(wav),a=document.createElement('a');a.href=url;a.download=`bandmap_${S.bpm}bpm.wav`;a.click();URL.revokeObjectURL(url);
    setTimeout(()=>{bar.style.width='0';lbl.textContent='WAV';$('expBtn').classList.remove('off');$('playBtn').classList.remove('off');exporting=false},1000);
  }catch(e){console.error(e);clearInterval(pi);bar.style.width='0';lbl.textContent='WAV';$('expBtn').classList.remove('off');$('playBtn').classList.remove('off');exporting=false}
};

function addBlk(bars){S.blocks.push({id:S.nid++,name:NAMES[S.blocks.length%NAMES.length],bars,color:COLORS[S.blocks.length%COLORS.length],claq:true,voice:true});S.showAdd=false;render()}
render();
</script>
</body>
